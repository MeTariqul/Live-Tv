<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Live TV</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
</head>
<body>
  <div class="tv-container">
    <div class="channel-bar" id="channelBar">
      <label for="channelSelect">CH</label>
      <select id="channelSelect" class="channel-select"></select>
      <span id="liveIndicator" class="live-indicator hidden">LIVE</span>
    </div>
    <div class="player-wrapper" id="playerWrapper">
      <video id="video" controls autoplay muted playsinline></video>
      <div class="offline-screen" id="offlineScreen">
        <div class="offline-content">
          <div class="offline-icon">📺</div>
          <h1>Channel Offline</h1>
          <p>This channel is currently not streaming</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.BACKEND_URL = 'http://localhost:3000';
  </script>
  <script src="js/viewer.js"></script>
</body>
</html>
