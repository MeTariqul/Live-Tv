<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - My Live TV</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="admin-container" id="loginContainer">
    <div class="card">
      <h2>Admin Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" />
        </div>
        <p class="error" id="loginError"></p>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
    </div>
  </div>

  <div class="admin-container" id="dashboardContainer" style="display: none;">
    <div class="card dashboard">
      <h2>Admin Panel</h2>
      <div class="create-form">
        <input type="text" id="channelName" placeholder="Channel name" maxlength="50" />
        <button id="createBtn" class="btn btn-primary">Create Channel</button>
      </div>
      <div class="channels-list" id="channelsList"></div>
      <button id="logoutBtn" class="btn btn-outline">Logout</button>
    </div>
  </div>

  <script>
    window.BACKEND_URL = 'http://localhost:3000';
  </script>
  <script src="js/admin.js"></script>
</body>
</html>
